# Prometheus configuration for Slurm Docker Cluster
# Scrapes metrics from Slurm PrometheusExporter and Pushgateway

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 10s

# Alertmanager configuration (optional - not configured in this demo)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: []

# Load rules once and periodically evaluate them
# rule_files:
#   - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Scrape Slurm metrics from slurmctld MetricsType=metrics/openmetrics
  # Documentation: https://slurm.schedmd.com/metrics.html
  
  - job_name: 'slurm_jobs'
    static_configs:
      - targets: ['slurmctld:6817']
        labels:
          cluster: 'linux'
    metrics_path: '/metrics/jobs'
    scrape_interval: 30s

  - job_name: 'slurm_nodes'
    static_configs:
      - targets: ['slurmctld:6817']
        labels:
          cluster: 'linux'
    metrics_path: '/metrics/nodes'
    scrape_interval: 30s

  - job_name: 'slurm_partitions'
    static_configs:
      - targets: ['slurmctld:6817']
        labels:
          cluster: 'linux'
    metrics_path: '/metrics/partitions'
    scrape_interval: 30s

  - job_name: 'slurm_scheduler'
    static_configs:
      - targets: ['slurmctld:6817']
        labels:
          cluster: 'linux'
    metrics_path: '/metrics/scheduler'
    scrape_interval: 30s

  - job_name: 'slurm_jobs_users_accts'
    static_configs:
      - targets: ['slurmctld:6817']
        labels:
          cluster: 'linux'
    metrics_path: '/metrics/jobs-users-accts'
    scrape_interval: 30s

  # Scrape application metrics from Pushgateway
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']
        labels:
          service: 'pushgateway'
    metrics_path: '/metrics'
    scrape_interval: 15s
